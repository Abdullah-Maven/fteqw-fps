name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [published]

jobs:
  # Build and test on macOS
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64]  # Apple Silicon
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: |
        brew install cmake sdl2 libpng jpeg-turbo libogg libvorbis freetype gnutls opus speex ffmpeg ode
    
    - name: Configure CMake
      run: |
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64 ..
    
    - name: Build Engine
      run: |
        cd build
        cmake --build . --config Release -j$(sysctl -n hw.ncpu)
    
    - name: Run Unit Tests
      run: |
        cd build
        ctest -R unit --output-on-failure
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fteqw-macos-arm64
        path: build/release/
        retention-days: 7

  # Build and test on Linux
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          libsdl2-dev \
          libpng-dev \
          libjpeg-dev \
          libogg-dev \
          libvorbis-dev \
          libfreetype6-dev \
          libgnutls28-dev \
          libopus-dev \
          libspeex-dev \
          libavcodec-dev \
          libavformat-dev \
          libavutil-dev \
          libode-dev \
          libsqlite3-dev \
          zlib1g-dev
    
    - name: Configure CMake (GCC)
      if: matrix.compiler == 'gcc'
      run: |
        mkdir build && cd build
        CC=gcc CXX=g++ cmake -DCMAKE_BUILD_TYPE=Release ..
    
    - name: Configure CMake (Clang)
      if: matrix.compiler == 'clang'
      run: |
        mkdir build && cd build
        CC=clang CXX=clang++ cmake -DCMAKE_BUILD_TYPE=Release ..
    
    - name: Build Engine
      run: |
        cd build
        cmake --build . --config Release -j$(nproc)
    
    - name: Run Unit Tests
      run: |
        cd build
        ctest -R unit --output-on-failure
    
    - name: Run Integration Tests
      run: |
        cd build
        ctest -R integration --output-on-failure
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fteqw-linux-${{ matrix.compiler }}
        path: build/release/
        retention-days: 7

  # Build and test on Windows
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: |
        choco install cmake sdl2 libpng jpeg freetype2 opus speex ffmpeg --yes
    
    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release ..
    
    - name: Build Engine
      run: |
        cd build
        cmake --build . --config Release
    
    - name: Run Unit Tests
      run: |
        cd build
        ctest -R unit --output-on-failure -C Release
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fteqw-windows-x64
        path: build/Release/
        retention-days: 7

  # Code quality checks
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck clang-format
    
    - name: Run Static Analysis (cppcheck)
      run: |
        cppcheck --enable=all --inconclusive --error-exitcode=1 \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          engine/ plugins/ quakec/
    
    - name: Check Code Formatting
      run: |
        find engine/ plugins/ quakec/ -name "*.c" -o -name "*.h" -o -name "*.cpp" | \
        xargs clang-format --dry-run --Werror || \
        echo "::warning::Code formatting issues found. Run clang-format to fix."
    
    - name: Check Documentation
      run: |
        # Verify all markdown files are valid
        find . -name "*.md" -not -path "./.git/*" | while read file; do
          if ! grep -q "^#" "$file"; then
            echo "::warning::$file has no headers"
          fi
        done

  # Security scanning
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Security Scan
      run: |
        # Check for hardcoded secrets
        if grep -r "password\|secret\|api_key\|token" --include="*.c" --include="*.h" --include="*.cpp" \
          engine/ plugins/ | grep -v "// " | grep -v "/*"; then
          echo "::error::Potential hardcoded secrets found!"
          exit 1
        fi
        
        # Check for unsafe functions
        if grep -r "gets(\|strcpy(\|sprintf(\|strcat(" --include="*.c" --include="*.h" \
          engine/ | grep -v "fgets\|strncpy\|snprintf\|strncat"; then
          echo "::warning::Potentially unsafe string functions found"
        fi
    
    - name: Dependency Vulnerability Check
      run: |
        # Check for known vulnerabilities in dependencies
        echo "Checking dependency versions..."
        # Add actual vulnerability scanning tool here (e.g., dependency-check, trivy)

  # Performance benchmarks
  benchmarks:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake libsdl2-dev libpng-dev libjpeg-dev \
          libogg-dev libvorbis-dev
    
    - name: Build with Benchmarks
      run: |
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_BENCHMARKS=ON ..
        cmake --build . --config Release -j$(nproc)
    
    - name: Run Benchmarks
      run: |
        cd build
        ./run_benchmarks.sh > benchmark_results.txt
    
    - name: Upload Benchmark Results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: build/benchmark_results.txt
        retention-days: 30

  # Create release artifacts
  release-artifacts:
    needs: [build-macos, build-linux, build-windows, code-quality, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
    
    - name: Create Release Package
      run: |
        mkdir release-package
        cp -r fteqw-macos-arm64/* release-package/ || true
        cp -r fteqw-linux-gcc/* release-package/ || true
        cp -r fteqw-windows-x64/* release-package/ || true
        
        # Add documentation
        cp README.md CHANGELOG.md LICENSE release-package/
        cp MACOS_M3_BUILD.md release-package/ || true
        
        # Create archives
        zip -r fteqw-${{ github.ref_name }}-macos-arm64.zip fteqw-macos-arm64/ || true
        zip -r fteqw-${{ github.ref_name }}-linux-x64.zip fteqw-linux-gcc/ || true
        zip -r fteqw-${{ github.ref_name }}-windows-x64.zip fteqw-windows-x64/ || true
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          fteqw-*-macos-*.zip
          fteqw-*-linux-*.zip
          fteqw-*-windows-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deploy documentation
  deploy-docs:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Generate Documentation
      run: |
        # Install Doxygen if needed
        sudo apt-get install -y doxygen graphviz
        
        # Generate API docs
        if [ -f Doxyfile ]; then
          doxygen Doxyfile
        fi
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        publish_branch: gh-pages
