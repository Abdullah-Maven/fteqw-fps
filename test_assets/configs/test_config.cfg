// FTEQW Test Configuration File
// Place this in your game directory as autoexec.cfg or test_config.cfg
// Load with: exec test_config.cfg

// Video Settings
vid_width 1920
vid_height 1080
vid_fullscreen 0
vid_vsync 0
gl_texturemode GL_LINEAR_MIPMAP_LINEAR

// Audio Settings
s_volume 0.7
s_musicvolume 0.5
s_soundquality 2

// Gameplay Settings
cl_movement 1
cl_predictlocal 1
cl_nolerp 0
sv_maxrate 100000
cl_maxrate 100000

// Developer/Debug Settings (enable for testing)
developer 1
log_file 1
showfps 1
r_drawworld 1
r_drawentities 1
r_drawviewmodel 1
r_particles 1
r_explosions 1

// Network Settings (for local testing)
sv_port 26000
cl_port 0  // Auto-assign client port

// Physics
sv_gravity 800
sv_maxvelocity 320
sv_friction 4
sv_waterfriction 1
sv_accelerate 10
sv_airaccelerate 1

// Rendering Features (FTE-specific)
r_shadow_realtime_world 1
r_shadow_realtime_world_lightmaps 0
r_shadow_realtime_dlight 1
r_shadow_realtime_entity 1
r_reflection_refectwater 0  // Disable water reflection for performance
r_bloom 1
r_bloom_intensity 0.5
r_glow 1
r_glow_intensity 0.3

// Console Settings
con_notifytime 4
con_logfile 1
con_debug 0

// Bindings for Testing
bind F1 "save quick"
bind F2 "load quick"
bind F3 "screenshot"
bind F4 "record demo_test"
bind F5 "stoprecord"
bind F9 "kill"
bind F10 "say_team test"
bind ~ "toggleconsole"
bind ESC "disconnect; menu_main"

// Test Commands (uncomment to run automatically)
// map start
// connect localhost

echo "FTEQW Test Configuration Loaded!"
echo "Press ~ to open console, type 'map start' to begin"
